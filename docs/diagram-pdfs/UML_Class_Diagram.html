    @page { size: 24in 16in; margin: 0.35in; }

    .sheet { width: 100%; min-height: 100vh; padding: 18px; background: #eef2f7; }

    .diagram-subtitle { font-size: 15px; fill: #64748b; }

    .class-text, .box-text, .entity-text { font-size: 12px; fill: #1f2937; }
    .entity-key { font-size: 12px; fill: #0f766e; font-weight: 800; }
    .entity-fk { font-size: 12px; fill: #7c3aed; font-weight: 700; }
    .section-label { font-size: 11px; fill: #64748b; font-weight: 700; }
    .box-title { font-size: 15px; font-weight: 800; fill: #1f2937; }
    .line-label { font-size: 11px; fill: #475569; font-weight: 700; paint-order: stroke; stroke: #f8fafc; stroke-width: 4px; }
    .group-label { font-size: 17px; fill: #1f2937; font-weight: 800; }
    .actor-label { font-size: 17px; fill: #1f2937; font-weight: 800; }
    .usecase-text { font-size: 13px; fill: #1f2937; font-weight: 700; }
    .note { font-size: 12px; fill: #64748b; }
    .schema-page { page-break-after: always; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 16px; padding: 30px; min-height: 15.2in; }
    .schema-page:last-child { page-break-after: auto; }
    h1 { margin: 0 0 6px; font-size: 34px; }
    h2 { margin: 22px 0 12px; font-size: 22px; color: #1f2937; }
    p { margin: 0 0 16px; color: #64748b; }
    .schema-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .relation { background: white; border: 1px solid #cbd5e1; border-radius: 10px; padding: 12px 14px; break-inside: avoid; box-shadow: 0 4px 12px rgba(15,23,42,.08); }

    .relation code { display: block; white-space: normal; line-height: 1.45; font-family: Consolas, "Courier New", monospace; font-size: 11.4px; color: #1f2937; }
    .fk { color: #6d28d9; font-weight: 700; }
    .pk { color: #0f766e; font-weight: 800; }
    .schema-note { padding: 12px 14px; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 10px; color: #9a3412; font-size: 13px; }
