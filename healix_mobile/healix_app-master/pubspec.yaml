name: healix_app
description: A Flutter health and wellness tracking app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  fl_chart: ^0.68.0
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  shared_preferences: ^2.3.2
  pedometer: ^4.0.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  http: ^1.2.1
  socket_io_client: 3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
